services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kova-app
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    image: nginx:alpine
    ports:
      - "9000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "3309:3306"
    environment:
      MYSQL_DATABASE: kova
      MYSQL_USER: kova
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "9025:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm run dev --host 0.0.0.0 --port 5170"
    ports:
      - "5170:5170"
    depends_on:
      app:
        condition: service_healthy

  queue:
    image: kova-app
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--timeout=90"]
    volumes:
      - .:/var/www/html
    depends_on:
      app:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  node_modules:
